version: "3.9"

services:
  # ── Trading Engine (Node.js) ───────────────────────────────────
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:9090"   # Prometheus metrics
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=info
      - REDIS_URL=redis://redis:6379
      - DB_URL=postgresql://trading:trading@timescaledb:5432/trading
      - ML_SERVICE_URL=http://ml:8000
    depends_on:
      - redis
      - timescaledb
      - ml
    restart: unless-stopped
    volumes:
      - ./data:/app/data

  # ── ML Prediction Service (Python) ────────────────────────────
  ml:
    build:
      context: ./ml
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ── Redis (event streaming + state) ───────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # ── TimescaleDB (tick storage) ────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: trading
      POSTGRES_DB: trading
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  # ── Prometheus (metrics collection) ───────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - engine

  # ── Grafana (dashboards) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: trading
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  redis-data:
  pg-data:
  grafana-data:
